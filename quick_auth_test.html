<!DOCTYPE html>
<html>
<head>
    <title>Quick Auth0 Test</title>
</head>
<body>
    <h1>Auth0 Quick Test</h1>
    <button onclick="startAuth()">1. Start Auth0 Login</button>
    <div id="result"></div>
    
    <script>
    function startAuth() {
        // Open Auth0 login in popup
        const authUrl = 'https://app.zebra.associates/login';
        const popup = window.open(authUrl, 'auth', 'width=500,height=600');
        
        // Monitor popup for callback
        const checkClosed = setInterval(() => {
            if (popup.closed) {
                clearInterval(checkClosed);
                document.getElementById('result').innerHTML = '<p>Check browser console for any captured code</p>';
            }
            
            try {
                const url = popup.location.href;
                if (url.includes('callback?code=')) {
                    const urlParams = new URLSearchParams(popup.location.search);
                    const code = urlParams.get('code');
                    
                    if (code) {
                        popup.close();
                        testWithCode(code);
                    }
                }
            } catch (e) {
                // Cross-origin error expected until callback
            }
        }, 1000);
    }
    
    async function testWithCode(code) {
        console.log('🎯 Captured Auth0 code:', code.substring(0, 20) + '...');
        
        try {
            const response = await fetch('https://marketedge-platform.onrender.com/api/v1/database/auth-debug', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    code: code,
                    redirect_uri: 'https://app.zebra.associates/callback'
                })
            });
            
            const result = await response.json();
            console.log('🔍 Debug Result:', result);
            
            document.getElementById('result').innerHTML = 
                '<h3>Test Result:</h3><pre>' + JSON.stringify(result, null, 2) + '</pre>';
                
        } catch (error) {
            console.error('❌ Test failed:', error);
            document.getElementById('result').innerHTML = '<p>Error: ' + error.message + '</p>';
        }
    }
    </script>
</body>
</html>
